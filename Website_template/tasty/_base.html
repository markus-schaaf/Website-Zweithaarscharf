{% load static %}<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Zweithaar Schaaf{% endblock %}</title>
  <meta name="description" content="{% block description %}Zweithaar Schaaf &ndash; Echthaarper&uuml;cken in Premiumqualit&auml;t.{% endblock %}">
  <meta name="author" content="Zweithaar Schaaf">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{% static 'css/theme-2a.css' %}">
  {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

  <div id="page">
    {% include "tasty/_header.html" %}

    <main>
      {% block content %}{% endblock %}
    </main>

    {% include "tasty/_footer.html" %}
  </div>

  <script src="{% static 'js/jquery.min.js' %}"></script>
  <script src="{% static 'js/jquery.easing.1.3.js' %}"></script>
  {% block extra_js_top %}{% endblock %}
  <script src="{% static 'js/main.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
